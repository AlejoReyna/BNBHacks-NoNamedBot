<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=covered">
  <title>Market Terminal</title>
  <style>
    :root {
      --bg: #000000;
      --grid: #111111;
      --text: #f5f5f5;
      --muted: #737373;
      --active: #ffffff;
      --border: #1a1a1a;
      --user-bubble: #1a1a1a;
      --bot-bubble: #0a0a0a;
      --nav-icon: 22px;
      --nav-terminal: 48px;
      --nav-terminal-mobile: 56px;
      --bar-height: 52px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .msg {
      max-width: 92%;
      padding: 0.7rem 0.9rem;
      border-radius: 10px;
      font-size: 0.88rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border: 1px solid var(--border);
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      color: #d4d4d4;
    }

    .msg.bot .source {
      display: block;
      margin-top: 0.45rem;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .typing {
      flex-shrink: 0;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0 1rem 0.35rem;
      background: var(--bg);
    }

    .composer {
      flex-shrink: 0;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      padding: 0.75rem 1rem 0.5rem;
      background: var(--bg);
    }

    .composer input {
      flex: 1;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      padding: 0.5rem 0;
      font-size: 0.9rem;
      outline: none;
    }

    .composer input::placeholder {
      color: #525252;
    }

    .composer button[type="submit"] {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #111;
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .composer button[type="submit"]:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .composer button[type="submit"] svg {
      width: 16px;
      height: 16px;
    }

    /* Bottom bar — fixed compact height; terminal circle positioned independently */
    .bottom-bar {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: var(--bar-height);
      min-height: var(--bar-height);
      padding: 0 0.5rem calc(0.35rem + env(safe-area-inset-bottom, 0px));
      background: var(--bg);
      border-top: 1px solid var(--border);
      position: relative;
      overflow: visible;
    }

    .bar-cluster {
      display: flex;
      align-items: center;
      justify-content: space-around;
      min-width: 0;
      height: 100%;
    }

    .bar-cluster.left { padding-right: 0.15rem; }
    .bar-cluster.right { padding-left: 0.15rem; }

    .nav-terminal-slot {
      width: var(--nav-terminal);
      flex-shrink: 0;
      pointer-events: none;
    }

    .nav-link {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 0.25rem 0.15rem 0;
      position: relative;
    }

    .nav-link .icon-wrap {
      width: var(--nav-icon);
      height: var(--nav-icon);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .nav-link svg {
      width: var(--nav-icon);
      height: var(--nav-icon);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
    }

    .nav-link span {
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1;
      white-space: nowrap;
    }

    .nav-link.active {
      color: var(--active);
    }

    .nav-link.active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 2px;
      background: var(--active);
      border-radius: 1px;
    }

    .nav-terminal-wrap {
      position: absolute;
      left: 50%;
      bottom: calc(0.35rem + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%) translateY(5px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      z-index: 2;
      pointer-events: auto;
    }

    .nav-terminal-wrap.active::before {
      content: "";
      position: absolute;
      top: calc(-1 * (var(--nav-terminal) + 0.85rem + 5px));
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 2px;
      background: var(--active);
      border-radius: 1px;
    }

    .nav-terminal {
      width: var(--nav-terminal);
      height: var(--nav-terminal);
      border-radius: 50%;
      border: 1.5px solid #333;
      background: radial-gradient(circle at 30% 30%, #1f1f1f, #0a0a0a);
      color: var(--active);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 0 0 0 1px #000, 0 4px 12px rgba(0, 0, 0, 0.5);
      margin-top: 0;
    }

    .nav-terminal svg {
      width: calc(var(--nav-terminal) * 0.46);
      height: calc(var(--nav-terminal) * 0.46);
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-terminal:active {
      transform: scale(0.96);
    }

    .nav-terminal-wrap:active .nav-terminal {
      transform: scale(0.96);
    }

    .nav-terminal-label {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--active);
      line-height: 1;
    }

    @media (max-width: 640px) {
      :root {
        --nav-icon: 20px;
        --nav-terminal: var(--nav-terminal-mobile);
        --bar-height: 56px;
      }

      .nav-terminal-wrap {
        transform: translateX(-50%) translateY(7px);
      }

      .nav-terminal-wrap.active::before {
        top: calc(-1 * (var(--nav-terminal) + 0.85rem + 7px));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="messages" id="messages" aria-live="polite">
      <div class="msg bot">Ask about scans, x402 payments, or factor scores.<span class="source">CMC x402 · decision logs · bot health</span></div>
    </main>

    <div class="typing" id="typing" hidden>Thinking…</div>

    <form class="composer" id="composer">
      <input id="prompt" type="text" placeholder="Ask about scans, x402 payments, or factor scores…" autocomplete="off" required>
      <button type="submit" id="send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </form>

    <nav class="bottom-bar" aria-label="Primary">
      <div class="bar-cluster left">
        <button type="button" class="nav-link" data-view="home" aria-label="Home">
          <span class="icon-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
          </span>
          <span>Home</span>
        </button>
        <button type="button" class="nav-link" data-view="positions" aria-label="Positions">
          <span class="icon-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
          </span>
          <span>Positions</span>
        </button>
        <button type="button" class="nav-link" data-view="activity" aria-label="Activity">
          <span class="icon-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </span>
          <span>Activity</span>
        </button>
      </div>

      <div class="nav-terminal-slot" aria-hidden="true"></div>

      <div class="bar-cluster right">
        <button type="button" class="nav-link" data-view="wallet" aria-label="Wallet">
          <span class="icon-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 7H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/><path d="M17 13h.01"/><path d="M3 10h18"/></svg>
          </span>
          <span>Wallet</span>
        </button>
        <button type="button" class="nav-link" data-view="guide" aria-label="Guide">
          <span class="icon-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          </span>
          <span>Guide</span>
        </button>
      </div>

      <div class="nav-terminal-wrap active" id="terminal-wrap">
        <button type="button" class="nav-terminal" id="terminal-btn" aria-label="Market terminal">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </button>
        <span class="nav-terminal-label">Terminal</span>
      </div>
    </nav>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const composer = document.getElementById("composer");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("send");
    const typingEl = document.getElementById("typing");
    const terminalBtn = document.getElementById("terminal-btn");
    const terminalWrap = document.getElementById("terminal-wrap");

    function appendMessage(text, role, source) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      if (source && role === "bot") {
        const span = document.createElement("span");
        span.className = "source";
        span.textContent = source;
        div.appendChild(span);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage(text) {
      appendMessage(text, "user");
      typingEl.hidden = false;
      sendBtn.disabled = true;
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        appendMessage(data.reply || data.error || "No response", "bot", data.source || "");
      } catch (err) {
        appendMessage("Could not reach the market API. Is the bot running?", "bot", "offline");
      } finally {
        typingEl.hidden = true;
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    composer.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = promptEl.value.trim();
      if (!text) return;
      promptEl.value = "";
      sendMessage(text);
    });

    terminalBtn.addEventListener("click", () => {
      document.querySelectorAll(".nav-link").forEach((el) => el.classList.remove("active"));
      terminalWrap.classList.add("active");
      promptEl.focus();
    });

    document.querySelectorAll(".nav-link").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".nav-link").forEach((el) => el.classList.remove("active"));
        terminalWrap.classList.remove("active");
        btn.classList.add("active");
        const view = btn.dataset.view;
        if (view === "activity") {
          fetch("/health")
            .then((r) => r.json())
            .then((data) => {
              appendMessage(
                `Status: ${data.status}\nPositions: ${data.positions}\nML: ${data.ml_mode}`,
                "bot",
                "/health"
              );
            })
            .catch(() => appendMessage("Health endpoint unavailable.", "bot"));
        } else {
          appendMessage(`${view} view is not available — terminal chat is the active interface.`, "bot");
        }
      });
    });

    promptEl.focus();
  </script>
</body>
</html>
